<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Системный аналитик · Интерактивный тренажёр</title>
  <style>
    :root {
      --bg-base: #0b0c10;
      --glass: rgba(18, 22, 28, 0.75);
      --glass-border: rgba(255, 255, 255, 0.08);
      --ink: #e5e9f0;
      --ink-soft: #9ca3af;
      --accent: #6d8cff;
      --accent-glow: rgba(109, 140, 255, 0.18);
      --ok: #34d399;
      --ok-bg: rgba(52, 211, 153, 0.08);
      --bad: #f87171;
      --bad-bg: rgba(248, 113, 113, 0.08);
      --radius-sm: 14px;
      --radius-lg: 24px;
      --shadow-card: 0 20px 40px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.05);
      --font-sans: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg-base);
      background-image: radial-gradient(ellipse at 40% 20%, #1e293b 0%, #0b0c10 70%);
      font-family: var(--font-sans);
      color: var(--ink);
      line-height: 1.5;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      padding: 1.5rem;
      display: flex;
      justify-content: center;
    }

    .wrap {
      width: 100%;
      max-width: 760px;
      display: flex;
      flex-direction: column;
      gap: 1.8rem;
      padding-bottom: 3rem;
    }

    header {
      position: sticky;
      top: 1.2rem;
      z-index: 10;
      background: rgba(15, 18, 25, 0.7);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: 80px;
      padding: 0.8rem 1.8rem;
      display: flex;
      flex-direction: column;
      gap: 0.7rem;
      box-shadow: 0 12px 28px rgba(0,0,0,0.6);
    }

    .meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.9rem;
      font-weight: 500;
      color: var(--ink-soft);
    }
    .meta strong {
      color: white;
      font-weight: 600;
    }
    .score-badge {
      background: rgba(255,255,255,0.06);
      padding: 0.3rem 1rem;
      border-radius: 40px;
      font-weight: 600;
    }

    .bar {
      height: 6px;
      width: 100%;
      background: rgba(255,255,255,0.08);
      border-radius: 10px;
      overflow: hidden;
    }
    .bar>span {
      display: block;
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #6d8cff, #a78bfa);
      border-radius: 10px;
      box-shadow: 0 0 10px var(--accent-glow);
      transition: width 0.4s cubic-bezier(0.2, 0.9, 0.4, 1);
    }

    .card {
      background: var(--glass);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-lg);
      padding: 2rem 2.2rem;
      box-shadow: var(--shadow-card);
    }

    .step-label {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 1.8px;
      font-weight: 600;
      color: var(--accent);
      margin-bottom: 0.7rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .step-label::before {
      content: '';
      width: 8px;
      height: 8px;
      background: var(--accent);
      border-radius: 50%;
      box-shadow: 0 0 12px var(--accent);
    }

    h1 {
      font-size: 1.9rem;
      font-weight: 650;
      line-height: 1.25;
      margin-bottom: 1.6rem;
      background: linear-gradient(to right, #f0f4ff, #cbd5ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .theory p {
      margin-bottom: 1rem;
      color: #cdd5e0;
    }
    .example {
      background: rgba(255,255,255,0.03);
      border-left: 3px solid var(--accent);
      padding: 1.2rem 1.5rem;
      border-radius: 0 12px 12px 0;
      margin: 1.5rem 0 0.5rem;
      color: #b9c2d4;
    }
    .example b {
      color: white;
      font-weight: 600;
    }

    .question {
      margin-top: 2.2rem;
      border-top: 1px solid rgba(255,255,255,0.06);
      padding-top: 2rem;
    }
    .question h2 {
      font-size: 1.25rem;
      font-weight: 600;
      margin-bottom: 1.5rem;
    }
    .hint {
      color: var(--ink-soft);
      font-size: 0.9rem;
      margin-bottom: 1.2rem;
    }

    .options {
      display: flex;
      flex-direction: column;
      gap: 0.9rem;
    }
    .opt {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      color: var(--ink);
      padding: 1rem 1.4rem;
      border-radius: var(--radius-sm);
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      text-align: left;
      backdrop-filter: blur(5px);
    }
    .opt:hover:not(:disabled) {
      background: rgba(109,140,255,0.12);
      border-color: rgba(109,140,255,0.4);
      transform: translateX(4px);
    }
    .opt.correct {
      background: var(--ok-bg);
      border-color: var(--ok);
      color: #bbf7d0;
    }
    .opt.wrong {
      background: var(--bad-bg);
      border-color: var(--bad);
      color: #fecaca;
    }
    .mark {
      font-weight: 700;
      margin-left: 6px;
    }
    .opt.correct .mark { color: var(--ok); }
    .opt.wrong .mark { color: var(--bad); }

    .pool {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      min-height: 70px;
      padding: 1rem;
      border: 1px dashed rgba(255,255,255,0.15);
      border-radius: 18px;
      margin-bottom: 1.8rem;
      background: rgba(0,0,0,0.2);
    }
    .buckets {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }
    .bucket {
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 18px;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 10px;
      min-height: 110px;
      background: rgba(255,255,255,0.02);
    }
    .bucket-head {
      display: flex;
      flex-direction: column;
    }
    .bucket-name {
      font-weight: 700;
      font-size: 0.95rem;
      text-transform: uppercase;
    }
    .bucket-hint {
      font-size: 0.75rem;
      color: var(--ink-soft);
    }
    .drop-over {
      border-color: var(--accent);
      background: rgba(109,140,255,0.1);
      box-shadow: 0 0 18px var(--accent-glow);
    }
    .chip {
      background: rgba(20,25,35,0.9);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 10px 14px;
      font-size: 0.9rem;
      cursor: grab;
      backdrop-filter: blur(8px);
      user-select: none;
    }
    .chip.selected {
      border-color: var(--accent);
      background: rgba(109,140,255,0.15);
    }
    .chip.chip-ok { border-color: var(--ok); background: rgba(52,211,153,0.1); }
    .chip.chip-bad { border-color: var(--bad); background: rgba(248,113,113,0.1); }
    .ghost-chip {
      position: fixed;
      z-index: 1000;
      pointer-events: none;
      opacity: 0.95;
      box-shadow: 0 20px 35px rgba(0,0,0,0.7);
    }

    .feedback {
      margin-top: 1.5rem;
      padding: 1rem 1.4rem;
      border-radius: 14px;
      font-size: 0.95rem;
      display: none;
    }
    .feedback.show { display: block; }
    .feedback.ok { background: var(--ok-bg); color: #a7f0d0; border: 1px solid rgba(52,211,153,0.3); }
    .feedback.bad { background: var(--bad-bg); color: #fecaca; border: 1px solid rgba(248,113,113,0.3); }
    .verdict { font-weight: 700; display: block; margin-bottom: 0.3rem; }

    .actions {
      margin-top: 2rem;
      display: flex;
      justify-content: flex-end;
      gap: 1rem;
    }
    .btn {
      background: white;
      border: none;
      color: #0b0c10;
      font-weight: 650;
      padding: 0.8rem 2rem;
      border-radius: 40px;
      font-size: 0.95rem;
      cursor: pointer;
      background: linear-gradient(135deg, #e0e7ff, #c4b5fd);
      box-shadow: 0 6px 18px rgba(109,140,255,0.3);
      transition: 0.2s;
    }
    .btn:disabled {
      opacity: 0.4;
      box-shadow: none;
      cursor: not-allowed;
      filter: grayscale(0.5);
    }
    .btn.ghost {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.2);
      color: #d1d5db;
      box-shadow: none;
    }
    .btn.ghost:hover:not(:disabled) {
      background: rgba(255,255,255,0.08);
      color: white;
    }

    .final {
      text-align: center;
    }
    .final .score {
      font-size: 4rem;
      font-weight: 700;
      background: linear-gradient(to right, #a5b4fc, #c084fc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin: 0.5rem 0;
    }
    .final .cta {
      margin-top: 2rem;
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
    }
    a.btn {
      text-decoration: none;
      display: inline-block;
    }

    @media (max-width: 550px) {
      .buckets { grid-template-columns: 1fr; }
      body { padding: 0.8rem; }
      .card { padding: 1.5rem; }
    }
  </style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="meta">
      <span>📋 Этап <strong id="cur">1</strong> / <strong id="total">11</strong></span>
      <span class="score-badge">⭐ <strong id="score">0</strong> баллов</span>
    </div>
    <div class="bar"><span id="progress"></span></div>
  </header>
  <main id="app"></main>
</div>

          "Контракт нужен только для внешних систем",
          "Чтобы стороны работали параллельно, без разночтений",
          "Чтобы фронтенд подождал бэкенд",
          "Это формальность, формат всё равно поменяется"
        ],
        answer:1,
        explain:"Контракт — зафиксированная договорённость, позволяющая работать одновременно."
      },
      {
        title:"Крайние случаи, ограничения и согласование scope",
        theory:[
          "Аналитик продумывает крайние случаи (edge cases) и фиксирует границы проекта (scope)."
        ],
        example:"Крайний случай: руководитель в отпуске — кто одобряет? Scope: в релиз идут Must и Should.",
        question:"Что из перечисленного — крайний случай (edge case)?",
        options:[
          "Руководитель, который должен одобрять, сам находится в отпуске",
          "Сотрудник подал заявку, руководитель её одобрил",
          "Сотрудник открыл портал с телефона",
          "Кадровик выгрузил список отпусков"
        ],
        answer:0,
        explain:"«Одобряющий недоступен» ломает основной сценарий и требует правила эскалации."
      },
      {
        title:"ТЗ и передача в разработку",
        theory:[
          "Итог — техническое задание: однозначное, полное, проверяемое. Аналитик передаёт его команде и остаётся на связи."
        ],
        example:"ТЗ собирает роли, ФТ/НФТ, модель данных, интеграции и критерии приёмки.",
        question:"Какой пункт ТЗ отвечает на вопрос «как понять, что функция сделана правильно»?",
        options:[
          "Назначение системы",
          "Глоссарий терминов",
          "Критерии приёмки",
          "Список ролей пользователей"
        ],
        answer:2,
        explain:"Критерии приёмки — проверяемые условия готовности."
      }
    ];

    const CTA_LINK = "https://t.me/Hub_Launch";
    const CTA_TEXT = "Написать нам в Telegram";
    const ABOUT_TITLE = "Launch Hub";
    const ABOUT_TEXT  = "Мы обучаем этой специальности с нуля: разбираем реальные проекты, "
                      + "тренируем на живых кейсах вроде этого и доводим до собеседования. "
                      + "Если профессия показалась интересной — напишите нам в Telegram, расскажем подробнее.";

    const app = document.getElementById("app");
    const elCur = document.getElementById("cur");
    const elTotal = document.getElementById("total");
    const elScore = document.getElementById("score");
    const elBar = document.getElementById("progress");

    let index = 0, score = 0, answered = false;
    elTotal.textContent = STAGES.length;

    function updateHeader() {
      elBar.style.width = (index / STAGES.length * 100) + "%";
      elCur.textContent = index + 1;
      elScore.textContent = score;
    }

    function theoryBlock(s) {
      return `<div class="theory">${s.theory.map(p => "<p>" + p + "</p>").join("")}<p class="example">${s.example}</p></div>`;
    }

    function renderStage() {
      answered = false;
      updateHeader();
      const s = STAGES[index];
      if (s.type === "sort") renderSort(s);
      else renderQuiz(s);
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function renderQuiz(s) {
      app.innerHTML = `
        <section class="card">
          <div class="step-label">Этап ${index+1}</div>
          <h1>${s.title}</h1>
          ${theoryBlock(s)}
          <div class="question">
            <h2>${s.question}</h2>
            <div class="options" id="options"></div>
            <div class="feedback" id="feedback"></div>
          </div>
          <div class="actions">
            <button class="btn" id="next" disabled>${index===STAGES.length-1?"Завершить":"Далее"}</button>
          </div>
        </section>`;
      const box = document.getElementById("options");
      s.options.forEach((text, i) => {
        const b = document.createElement("button");
        b.className = "opt";
        b.innerHTML = text;
        b.onclick = () => chooseQuiz(i, b, s);
        box.appendChild(b);
      });
      document.getElementById("next").onclick = goNext;
    }

    function chooseQuiz(i, btn, s) {
      if (answered) return;
      answered = true;
      const buttons = [...document.querySelectorAll(".opt")];
      buttons.forEach(b => b.disabled = true);
      buttons[s.answer].classList.add("correct");
      buttons[s.answer].insertAdjacentHTML("beforeend", ' <span class="mark">— верно</span>');
      const fb = document.getElementById("feedback");
      if (i === s.answer) {
        score++;
        elScore.textContent = score;
        fb.className = "feedback ok show";
        fb.innerHTML = '<span class="verdict">Верно</span>' + s.explain;
      } else {
        btn.classList.add("wrong");
        btn.insertAdjacentHTML("beforeend", ' <span class="mark">— ваш ответ</span>');
        fb.className = "feedback bad show";
        fb.innerHTML = '<span class="verdict">Не совсем</span>' + s.explain;
      }
      document.getElementById("next").disabled = false;
    }

    let sortLocked = false, selectedChip = null, dragState = null;

    function shuffle(a) {
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function renderSort(s) {
      sortLocked = false;
      selectedChip = null;
      dragState = null;
      const buckets = s.buckets.map(b => `
        <div class="bucket" data-drop="${b.id}">
          <div class="bucket-head"><span class="bucket-name">${b.label}</span><span class="bucket-hint">${b.hint}</span></div>
        </div>`).join("");
      app.innerHTML = `
        <section class="card" id="sortCard">
          <div class="step-label">Этап ${index+1}</div>
          <h1>${s.title}</h1>
          ${theoryBlock(s)}
          <div class="question">
            <h2>${s.prompt}</h2>
            <p class="hint">${s.hint}</p>
            <div class="pool" id="pool" data-drop="pool"></div>
            <div class="buckets">${buckets}</div>
            <div class="feedback" id="feedback"></div>
          </div>
          <div class="actions">
            <button class="btn ghost" id="check" disabled>Проверить</button>
            <button class="btn" id="next" disabled>${index===STAGES.length-1?"Завершить":"Далее"}</button>
          </div>
        </section>`;
      const pool = document.getElementById("pool");
      shuffle(s.items.slice()).forEach(it => {
        const chip = document.createElement("div");
        chip.className = "chip";
        chip.dataset.id = it.id;
        chip.textContent = it.text;
        pool.appendChild(chip);
      });
      const card = document.getElementById("sortCard");
      card.addEventListener("pointerdown", onPointerDown);
      card.addEventListener("click", onCardClick);
      document.getElementById("check").onclick = () => checkSort(s);
      document.getElementById("next").onclick = goNext;
      refreshCheck();
    }

    function refreshCheck() {
      const remaining = document.querySelectorAll("#pool .chip").length;
      const btn = document.getElementById("check");
      if (btn && !sortLocked) btn.disabled = remaining !== 0;
    }

    function onPointerDown(e) {
      if (sortLocked) return;
      const chip = e.target.closest(".chip");
      if (!chip) return;
      e.preventDefault();
      const r = chip.getBoundingClientRect();
      dragState = { chip, moved: false, startX: e.clientX, startY: e.clientY, offX: e.clientX - r.left, offY: e.clientY - r.top, ghost: null };
      window.addEventListener("pointermove", onPointerMove);
      window.addEventListener("pointerup", onPointerUp);
    }

    function onPointerMove(e) {
      if (!dragState) return;
      if (!dragState.moved) {
        if (Math.hypot(e.clientX - dragState.startX, e.clientY - dragState.startY) < 6) return;
        dragState.moved = true;
        const g = dragState.chip.cloneNode(true);
        g.classList.add("ghost-chip");
        g.style.width = dragState.chip.getBoundingClientRect().width + "px";
        document.body.appendChild(g);
        dragState.ghost = g;
        dragState.chip.classList.add("dragging");
      }
      e.preventDefault();
      dragState.ghost.style.left = (e.clientX - dragState.offX) + "px";
      dragState.ghost.style.top = (e.clientY - dragState.offY) + "px";
      highlightUnder(e);
    }

    function onPointerUp(e) {
      window.removeEventListener("pointermove", onPointerMove);
      window.removeEventListener("pointerup", onPointerUp);
      if (!dragState) return;
      const { chip, moved } = dragState;
      if (moved) {
        const dz = dropZoneUnder(e);
        if (dz) dz.appendChild(chip);
        cleanupDrag();
        refreshCheck();
      } else {
        cleanupDrag();
        toggleSelect(chip);
      }
    }

    function dropZoneUnder(e) {
      const g = dragState && dragState.ghost;
      if (g) g.style.display = "none";
      const el = document.elementFromPoint(e.clientX, e.clientY);
      if (g) g.style.display = "";
      return el ? el.closest("[data-drop]") : null;
    }

    function highlightUnder(e) {
      document.querySelectorAll(".drop-over").forEach(x => x.classList.remove("drop-over"));
      const dz = dropZoneUnder(e);
      if (dz) dz.classList.add("drop-over");
    }

    function cleanupDrag() {
      if (dragState) {
        if (dragState.ghost) dragState.ghost.remove();
        dragState.chip.classList.remove("dragging");
      }
      document.querySelectorAll(".drop-over").forEach(x => x.classList.remove("drop-over"));
      dragState = null;
    }

    function toggleSelect(chip) {
      if (sortLocked) return;
      if (selectedChip === chip) { chip.classList.remove("selected"); selectedChip = null; return; }
      if (selectedChip) selectedChip.classList.remove("selected");
      selectedChip = chip;
      chip.classList.add("selected");
    }

    function onCardClick(e) {
      if (sortLocked || !selectedChip) return;
      if (e.target.closest(".chip")) return;
      const dz = e.target.closest("[data-drop]");
      if (!dz) return;
      dz.appendChild(selectedChip);
      selectedChip.classList.remove("selected");
      selectedChip = null;
      refreshCheck();
    }

    function checkSort(s) {
      if (document.querySelectorAll("#pool .chip").length) return;
      sortLocked = true;
      answered = true;
      if (selectedChip) { selectedChip.classList.remove("selected"); selectedChip = null; }
      let allCorrect = true;
      s.items.forEach(it => {
        const chip = document.querySelector('.chip[data-id="' + it.id + '"]');
        const placed = chip.parentElement.dataset.drop;
        if (placed === it.bucket) { chip.classList.add("chip-ok"); }
        else {
          chip.classList.add("chip-bad");
          allCorrect = false;
          const lbl = s.buckets.find(b => b.id === it.bucket).label;
          chip.insertAdjacentHTML("beforeend", ' <span class="chip-note">→ ' + lbl + '</span>');
        }
      });
      if (allCorrect) { score++; elScore.textContent = score; }
      const fb = document.getElementById("feedback");
      fb.className = "feedback " + (allCorrect ? "ok" : "bad") + " show";
      fb.innerHTML = '<span class="verdict">' + (allCorrect ? "Всё верно" : "Почти — смотрите подсказки") + '</span>' + s.explain;
      document.getElementById("check").disabled = true;
      document.getElementById("next").disabled = false;
    }

    function goNext() {
      if (index < STAGES.length - 1) { index++; renderStage(); }
      else renderFinal();
    }

    function renderFinal() {
      elBar.style.width = "100%";
      elCur.textContent = STAGES.length;
      app.innerHTML = `
        <section class="card final">
          <div class="step-label">Готово</div>
          <div class="score">${score}<small> / ${STAGES.length}</small></div>
          <p style="color:#cdd5e0; margin:1.5rem 0; text-align:left;">
            Вы прошли путь одного проекта — от сырой «хотелки» заказчика до готового ТЗ.
            Сбор и уточнение требований, ФТ и НФТ, приоритизация, моделирование сценариев,
            проектирование данных, процессов, интеграций и API, крайние случаи и согласование
            scope — <strong>это и есть работа системного аналитика</strong>.
          </p>
          <div style="border-top:1px solid rgba(255,255,255,0.1); padding-top:1.5rem; margin-top:1.5rem; text-align:left;">
            <h3 style="color:white;">${ABOUT_TITLE}</h3>
            <p style="color:var(--ink-soft);">${ABOUT_TEXT}</p>
          </div>
          <div class="cta">
            <a class="btn" href="${CTA_LINK}" target="_blank" rel="noopener">${CTA_TEXT}</a>
            <button class="btn ghost" id="restart">Пройти заново</button>
          </div>
        </section>`;
      document.getElementById("restart").onclick = restart;
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function restart() { index = 0; score = 0; renderStage(); }

    renderStage();
  })();
</script>
</body>
</html>
